<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Statistics</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/birdtabs.css">
</head>
<body>
  <div class="tab-container">
    <div class="tabs">
      <button class="tab active" onclick="showTab(0)">Count by Hour</button>
      <button class="tab" onclick="showTab(1)">Count by Month</button>
      <button class="tab" onclick="showTab(2)">Count by Temperature</button>
      <button class="tab" onclick="showTab(3)">Count by Humidity</button>
    </div>
    <div class="tab-content active" id="tab0">
      <img src="hours_histo.svg" alt="Histogram by Hour">
    </div>
    <div class="tab-content" id="tab1">
      <img src="month_histo.svg" alt="Histogram by Month">
    </div>
    <div class="tab-content" id="tab2">
      <img src="countsbytemp.svg" alt="Count vs Temperature">
    </div>
    <div class="tab-content" id="tab3">
      <img src="countsbyhumid.svg" alt="Count vs Humidity">
      Humidity and Rain are linked.
    </div>
  </div>
  <script>
    function showTab(idx) {
      var tabs = document.querySelectorAll('.tab');
      var contents = document.querySelectorAll('.tab-content');
      tabs.forEach((tab, i) => {
        tab.classList.toggle('active', i === idx);
        contents[i].classList.toggle('active', i === idx);
      });
    }
  </script>
</body>
</html>
