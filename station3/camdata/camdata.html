<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cam data</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/birdtabs.css">
</head>
<body>
  <div class="tab-container">
    <div class="tabs">
      <button class="tab active" onclick="showTab(0)">metaLux</button>
      <button class="tab" onclick="showTab(1)">exposure</button>
      <button class="tab" onclick="showTab(2)">gain</button>
    </div>
    <div class="tab-content active" id="tab0">
      <!-- target 'metaLux' must correspond to key in camdata.json, test like this: http://server/camdata?target=metaLux -->
      <img src="/camdata?target=metaLux" alt="metaLux">
    </div>
    <div class="tab-content" id="tab1">
      <img src="/camdata?target=exposure" alt="exposure">
    </div>
    <div class="tab-content" id="tab2">
      <img src="/camdata?target=gain" alt="gain">
    </div>
  </div>
  <script>
    function showTab(idx) {
      var tabs = document.querySelectorAll('.tab');
      var contents = document.querySelectorAll('.tab-content');
      tabs.forEach((tab, i) => {
        tab.classList.toggle('active', i === idx);
        contents[i].classList.toggle('active', i === idx);
      });
    }
  </script>
</body>
</html>
