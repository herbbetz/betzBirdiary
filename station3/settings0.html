<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Picam Settings</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
  body { font-size: 16px; font-family: sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
  .tab-container { width: 90%; margin: 30px auto; background: white; border-radius: 8px; box-shadow: 0 2px 8px #aaa; }
  .tabs {
    display: flex;
    border-bottom: 2px solid #3498db;
    background: #fafafa;
    border-radius: 8px 8px 0 0;
    overflow: hidden;
  }
  .tab {
    padding: 14px 28px;
    cursor: pointer;
    border: none;
    background: none;
    outline: none;
    font-size: 1.1em;
    transition: background 0.2s;
    color: #555;
  }
  .tab.active {
    background: #3498db;
    color: white;
    font-weight: bold;
  }
  .tab-content {
    display: none;
    padding: 24px;
    text-align: left;
  }
  .tab-content.active {
    display: block;
  }
  img {
    width: 32px;
    height: 32px;
  }
  table {
    border-collapse: collapse;
    width: 50%;
    max-width: 600px;
  }
  th, td {
    border: 1px solid #ddd;
    padding: 8px 12px;
  }
  th {
    background-color: #f4f4f4;
    text-align: left;
  }
</style>
</head>
<body>
<div class="tab-container">
  <div class="tabs">
    <button class="tab active" onclick="showTab(0)">View</button>
    <button class="tab" onclick="showTab(1)">Edit</button>
  </div>
  <div class="tab-content active" id="tab0">
    <h2>Settings</h2>
    <p>
      <img src="icons/redcrossedcam.svg" alt="redcrossicon"> no recording during feeding tray refill (click <img src="icons/vidcam.svg" alt="vidcam"> on main page)<br>
      <img src="icons/greencrossedcam.svg" alt="greencrossicon"> no recording during bad illumination
    <p>
      Following are the current settings loaded from <code>config.json</code>.<br>
      You can log in to the station and edit <code>config.json</code>.
      <table id="configTable">
        <thead>
          <tr>
            <th></th>
            <th>setting</th>
          </tr>
        </thead>
        <tbody>
          <!-- rows will be inserted here by JavaScript -->
        </tbody>
      </table>
    </p>
  </div>
  <div class="tab-content" id="tab1">
    here editing
  </div>
</div>


<script>
  function showTab(idx) {
    var tabs = document.querySelectorAll('.tab');
    var contents = document.querySelectorAll('.tab-content');
    tabs.forEach((tab, i) => {
      tab.classList.toggle('active', i === idx);
      contents[i].classList.toggle('active', i === idx);
    });
  }

  // Load config.json and display keys and values in the table
  fetch('config.json')
    .then(response => response.json())
    .then(data => {
      const tbody = document.querySelector('#configTable tbody');
      for (const [key, value] of Object.entries(data)) {
        const tr = document.createElement('tr');

        const tdKey = document.createElement('td');
        tdKey.textContent = key;
        tr.appendChild(tdKey);

        const tdValue = document.createElement('td');
        // Convert arrays/objects to JSON string, else use value directly
        tdValue.textContent = (typeof value === 'object') ? JSON.stringify(value) : value;
        tr.appendChild(tdValue);

        tbody.appendChild(tr);
      }
    })
    .catch(err => {
      const tbody = document.querySelector('#configTable tbody');
      tbody.innerHTML = `<tr><td colspan="2">Error loading config.json: ${err}</td></tr>`;
    });
</script>

</body>
</html>
