<!doctype html>
<html>
<head>
    <title>PiCamera Settings</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
    <meta http-equiv="Pragma" content="no-cache"/>
    <meta http-equiv="Expires" content="0"/>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="bird.css">
</head>
<body>
    <h2>Actions</h2>
    <div class="indented">
        <div class="rowed"><a href="/upload" class="button">snapshot</a> <a href="statist/showstats.html" class="button" target="_blank">API statistics</a></div>
        <div class="rowed"><a href="camdata/camdata.html" class="button" target="_blank">camera data</a> <a href="tempdata/tempdata.html" class="button" target="_blank">temperature data</a></div>
        <div class="rowed"><a href="keep/gallery.html" class="button">gallery</a> <a href="mybirds/mybirds.html" class="button">station's birds</a></div>
        <div class="rowed"><a href="/reboot" class="button">reboot</a> <a href="/shutdown" class="button">shutdown</a></div>
        <div class="rowed"><a href="/standby" class="button" id="stdby">standby</a> <a href="settings.html" class="button" target="_blank">settings</a></div>
        <div class="rowed"><a href="/daywatch" class="button" id="daywatch">daywatch</a> <a href="/videoking" class="button" id="videoking">videoking</a></div>
        <div class="rowed"><a href="vidshot3.html" class="button">back</a></div>
    </div>
    <hr>
    <div>Version <span id="version"></span>, herber7be7z@gmail.com</div>
    <div>last: <span id="lastDown"></span></div>
</body>
<script>
    //@ts-check
    'use strict';
    const versionElem = document.getElementById('version');
    const lastdownElem = document.getElementById('lastDown');
    const stdbyElem = document.getElementById('stdby');
    const vidmsgJson = "/msgjson2"; //"ramdisk/vidmsg.json";
    
    function getVersion() {
        fetch('/config.json', {cache: 'reload'}) //{cache: 'reload', mode: 'no-cors'} opaque-blocks?
        .then((response) => response.json())
        .then((data) => {
            let version = data['version']
            versionElem.textContent = version;
        })
    }
    function getLastdown() {
        fetch('/lastdown.json', {cache: 'reload'})
        .then(res => res.ok ? res.json() : null) //returns null if no lastdown.json yet
        .then(data => {
            if (data) {
                let msg = data['msg'];
                let date = data['date'];
                lastdownElem.textContent = msg + " at " + date;
            }
        })    
    }
    function getVidmsg() {
        fetch(vidmsgJson, {cache: 'reload'})
        .then((response) => response.json())
        .then((data) => {
            let standby = data['standby']
            if (standby == 1){
                stdbyElem.textContent = "STDBY OFF"
            }
            else {
                stdbyElem.textContent = "standby"
            }

        })
    }

    function updateStream() {
        getVidmsg(); // fetches window.curImgNum
        setTimeout(updateStream, 1000); // Update every 1000 milliseconds (adapt to capture scripts mainBirdX.py, event?)
    }

    // Call the updateStream function when the page loads
    window.onload = function() {
        getVersion();
        getLastdown(); // fetches last shutdown info
        updateStream(); //update loop
    };

</script>
</html>
