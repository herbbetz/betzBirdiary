<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>temp data</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/birdtabs.css">
</head>
<body>
  <div class="tab-container">
    <div class="tabs">
      <button class="tab active" onclick="showTab(0)">°C temperature</button>
      <button class="tab" onclick="showTab(1)">% humidity</button>
      <button class="tab" onclick="showTab(2)">humidity g/m3</button>
    </div>
    <div class="tab-content active" id="tab0">
      <!-- target 'temperature' must correspond to key in tempdata.json, test like this: http://server/tempdata?target=temperature -->
      <img src="/tempdata?target=temperature" alt="temperature">
    </div>
    <div class="tab-content" id="tab1">
      <img src="/tempdata?target=humidity" alt="humidity_rel">
    </div>
    <div class="tab-content" id="tab2">
      <img src="/tempdata?target=humid_abs" alt="humidity_abs">
    </div>
  </div>
  <script>
    function showTab(idx) {
      var tabs = document.querySelectorAll('.tab');
      var contents = document.querySelectorAll('.tab-content');
      tabs.forEach((tab, i) => {
        tab.classList.toggle('active', i === idx);
        contents[i].classList.toggle('active', i === idx);
      });
    }
  </script>
</body>
</html>
